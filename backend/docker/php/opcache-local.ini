; Local-dev-only opcache tuning for Sail on Windows.
;
; Sail's laravel.test container bind-mounts the whole backend/ directory
; from the Windows host (compose.yaml's `.:/var/www/html`). That bind mount
; is slow for the small-file stat() calls opcache does on every request to
; check whether a PHP file changed (opcache.validate_timestamps, PHP's
; default 2-second revalidate_freq) - on this filesystem that turns into a
; multi-second-to-timeout delay on the first request after any idle period.
; Widening the revalidation window to 60s keeps code-change pickup
; reasonably fast for active development while avoiding a full re-stat pass
; on nearly every request.
opcache.validate_timestamps=1
opcache.revalidate_freq=60
