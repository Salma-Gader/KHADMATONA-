; Production opcache tuning - the counterpart to docker/php/opcache-local.ini's
; dev-only settings. validate_timestamps=0 means PHP never re-stats source
; files to check for changes: correct here because a new deploy always means
; a freshly built image, never an in-place file edit against a running
; container. If that assumption ever changes, this has to change with it.
opcache.enable=1
opcache.validate_timestamps=0
opcache.max_accelerated_files=20000
opcache.memory_consumption=192
opcache.interned_strings_buffer=16

; Composer's autoloader (18k+ classmap entries once Laravel's framework is
; included) does a realpath() lookup per resolved class. The default 4096-byte
; cache is undersized for that; this avoids most of those becoming real
; filesystem stat() syscalls on every request.
realpath_cache_size=4096K
realpath_cache_ttl=600
