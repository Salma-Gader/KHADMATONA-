# Production vhost - serves Laravel's public/ and hands .php requests to
# php-fpm over the loopback interface (same container, both run under the
# supervisord in docker/supervisor/production.conf).
server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 20m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Laravel's own routes (not this block) handle 404s for everything under
    # /api - this only blocks direct access to dotfiles (.env, .git, ...).
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
