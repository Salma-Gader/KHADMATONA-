# VPS production deployment - NOT used for local dev (backend/compose.yaml
# and frontend/admin/compose.yaml cover that separately, with hot reload).
# Two public-facing services (Caddy only); backend/frontend/mysql/redis stay
# on the internal network and are never port-published to the host.
#
# Usage (see README.md's Deployment section for the full walkthrough):
#   cp .env.prod.example .env.prod
#   cp backend/.env.production.example backend/.env
#   # edit both, then:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#   docker compose -f docker-compose.prod.yml exec backend php artisan migrate --force

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      APP_DOMAIN: '${APP_DOMAIN}'
      API_DOMAIN: '${API_DOMAIN}'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - app

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app

  frontend:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: 'https://${API_DOMAIN}'
    restart: unless-stopped
    networks:
      - app

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ROOT_PASSWORD: '${DB_ROOT_PASSWORD}'
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-p${DB_PASSWORD}']
      retries: 5
      timeout: 5s

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - app
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      retries: 5
      timeout: 5s

networks:
  app:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
